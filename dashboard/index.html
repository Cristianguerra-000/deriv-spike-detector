<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Laboratorio Deriv</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <button id="drawerToggle" class="drawer-toggle" aria-label="Abrir menú">☰</button>
  <button id="signalBtn" class="signal-btn" aria-label="Señal Final" title="Señal Final"><span id="signalBtnDot" class="signal-btn__dot"></span>⚡</button>

  <!-- Panel señal final -->
  <div id="signalPanel" class="signal-panel signal-panel--hidden">
    <div class="sp-header">
      <span class="sp-title">⚡ Señal Final</span>
      <button class="sp-close" id="signalClose">✕</button>
    </div>
    <div class="sp-action" id="spAction">—</div>
    <div class="sp-score-row">
      <span class="sp-score-label">Score</span>
      <span class="sp-score-val" id="spScore">—</span>
    </div>
    <div class="sp-bar-wrap"><div class="sp-bar" id="spBar"></div></div>
    <div class="sp-details" id="spDetails"></div>
    <div class="sp-reason" id="spReason"></div>
    <div class="sp-divider">Contexto general</div>
    <div class="sp-context" id="spContext"></div>
  </div>

  <div id="drawerOverlay" class="drawer-overlay"></div>

  <aside id="drawer" class="drawer">
    <header class="drawer-header">
      <h2>Laboratorio</h2>
      <span class="badge" id="marketCount">0 mercados</span>
    </header>

    <div class="drawer-controls">
      <select id="granularity">
        <option value="60">1 minuto</option>
        <option value="300">5 minutos</option>
        <option value="900">15 minutos</option>
        <option value="3600">1 hora</option>
        <option value="86400">1 día</option>
      </select>
    </div>

    <nav class="drawer-nav">
      <input id="searchSymbol" type="search" placeholder="Buscar símbolo…" />
      <details open>
        <summary>Crash / Boom</summary>
        <ul id="list-crash_boom" class="symbol-list"></ul>
      </details>
      <details>
        <summary>Volatility</summary>
        <ul id="list-volatility" class="symbol-list"></ul>
      </details>
      <details>
        <summary>Forex</summary>
        <ul id="list-forex" class="symbol-list"></ul>
      </details>
      <details>
        <summary>Índices</summary>
        <ul id="list-indices" class="symbol-list"></ul>
      </details>
      <details>
        <summary>Otros</summary>
        <ul id="list-other" class="symbol-list"></ul>
      </details>
    </nav>
  </aside>

  <main class="main">
    <div class="chart-wrap">
      <!-- Gráfica principal -->
      <div id="chart"></div>

      <!-- Fondo de tensión (detrás de todo) -->
      <div id="tensionBg" class="tension-bg"></div>

      <!-- Alerta de spike (cubre toda la gráfica momentáneamente) -->
      <div id="spikeAlert" class="spike-alert spike-alert--hidden"></div>
    </div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
